<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CTF Bot Panel</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #0f172a;
        color: #e2e8f0;
      }

      .wrap {
        max-width: 720px;
        margin: 48px auto;
        padding: 20px;
      }

      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      p {
        margin: 0 0 16px;
        color: #94a3b8;
      }

      label {
        display: block;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0b1220;
        color: #e2e8f0;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }

      pre {
        margin-top: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>CTF Bot</h1>
        <p>Submit a URL and the headless bot will visit it.</p>

        <form id="visit-form">
          <label for="url">Target URL</label>
          <input id="url" name="url" type="url" required value="http://proxy:4000/" />
          <button type="submit">Send Visit</button>
        </form>

        <pre id="result">Waiting...</pre>
      </div>
    </div>

    <script>
      const form = document.getElementById('visit-form');
      const result = document.getElementById('result');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const url = document.getElementById('url').value;
        result.textContent = 'Sending request...';

        try {
          const response = await fetch('./visit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });

          const body = await response.text();
          result.textContent = `HTTP ${response.status}\n${body}`;
        } catch (error) {
          result.textContent = `Request failed: ${error.message}`;
        }
      });
    </script>
  </body>
</html>

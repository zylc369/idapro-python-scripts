worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  proxy_cache_path /var/cache/nginx/futurejs levels=1:2 keys_zone=futurejs_cache:20m max_size=256m inactive=5m use_temp_path=off;

  upstream next_app {
    server app:3000;
    keepalive 32;
  }

  upstream bot_app {
    server bot:3000;
    keepalive 16;
  }

  server {
    listen 4000;
    server_name _;

    location ^~ /_next/ {
      proxy_pass http://next_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_cache futurejs_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_key "$request_method|$scheme://$host$request_uri";
      proxy_cache_valid any 5m;
      proxy_cache_lock on;
      proxy_ignore_headers Cache-Control Expires Set-Cookie;
      proxy_hide_header Set-Cookie;
      add_header X-Proxy-Cache $upstream_cache_status always;
      add_header X-Proxy-Cache-Key "$request_method|$scheme://$host$request_uri" always;
      add_header Cache-Control "public, max-age=300" always;
    }

    location ^~ /bot/ {
      proxy_pass http://bot_app/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    location / {
      proxy_pass http://next_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }
  }
}

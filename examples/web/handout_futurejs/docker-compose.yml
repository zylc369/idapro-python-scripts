services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futurejs-app
    expose:
      - "3000"
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: futurejs-proxy
    depends_on:
      - app
    ports:
      - "4000:4000"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: futurejs-bot
    depends_on:
      - proxy
    environment:
      FLAG: ${FLAG:-SK-CERT{fake_flag}}
      CHALLENGE_URL: ${CHALLENGE_URL:-http://proxy:4000}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-10}
      BOT_PORT: 3000
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  nginx_cache:
